<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>學生會設備租借系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .btn-custom { padding: 15px; font-weight: bold; border-radius: 12px; margin-bottom: 15px; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-md-5 card p-4 p-md-5 text-center">
                <h1 class="mb-4">🛠️ 設備租借系統</h1>
                <p class="text-muted mb-5">請選擇您的身分進入系統</p>
                <button class="btn btn-primary btn-custom w-100" onclick="location.href='student.html'">🙋 我是學生 (我要借東西)</button>
                <button class="btn btn-dark btn-custom w-100" onclick="location.href='admin.html'">🔐 系統幹部 (點收與管理)</button>
            </div>
        </div>
    </div>
</body>
</html>

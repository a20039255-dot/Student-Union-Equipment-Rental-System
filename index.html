<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生會設備租借系統 - 入口大廳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4a90e2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>/* 當螢幕寬度小於 600px 時（手機模式） */
    @media (max-width: 600px) {
    .container {
        width: 95%; /* 容器佔滿螢幕 */
        margin: 10px auto;
        padding: 15px;
    }

    h1 { font-size: 1.5rem; } /* 標題縮小一點 */

    /* 讓按鈕變高、字變大，方便手指點擊 */
    button {
        width: 100%; /* 讓按鈕橫跨整個螢幕 */
        height: 50px;
        font-size: 1.1rem;
        margin-bottom: 10px;
    }

    /* 調整表格在手機上的顯示 */
    table {
        display: block;
        overflow-x: auto; /* 寬度不夠時可以左右滑動 */
    }
    
    /* 輸入框也要大一點 */
    input {
        height: 45px;
        font-size: 1rem !important;
    }
}</style>
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .portal-card { transition: transform 0.2s; cursor: pointer; text-decoration: none; }
        .portal-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

    <div class="container text-center">
        <h1 class="fw-bold mb-3 text-dark">🎓 學生會設備租借系統</h1>
        <p class="text-muted mb-5">請選擇您的身分以進入系統</p>

        <div class="row justify-content-center gap-4">
            <div class="col-md-4">
                <a href="student.html" class="card portal-card border-primary shadow-sm h-100">
                    <div class="card-body p-5">
                        <h1 class="display-4 mb-3">🧑‍🎓</h1>
                        <h3 class="card-title text-primary fw-bold">一般學生</h3>
                        <p class="card-text text-muted">查詢庫存與借用設備</p>
                    </div>
                </a>
            </div>

            <div class="col-md-4">
                <a href="admin.html" class="card portal-card border-warning shadow-sm h-100">
                    <div class="card-body p-5">
                        <h1 class="display-4 mb-3">🛡️</h1>
                        <h3 class="card-title text-warning fw-bold">系統幹部</h3>
                        <p class="card-text text-muted">點收設備與後台管理</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

</body>
</html>

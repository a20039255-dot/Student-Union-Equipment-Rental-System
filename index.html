<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>設備租借系統 - 入口大廳</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .btn-student { background-color: #4a90e2; color: white; }
        .btn-admin { background-color: #34495e; color: white; }
        @media (max-width: 600px) { .card { padding: 1.5rem; } }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛠️ 設備租借系統</h1>
        <p>請選擇您的身分進入系統</p>
        <button class="btn-student" onclick="location.href='student.html'">🙋 一般學生 (租借設備)</button>
        <button class="btn-admin" onclick="location.href='admin.html'">🔐 系統幹部 (管理後台)</button>
    </div>
</body>
</html>

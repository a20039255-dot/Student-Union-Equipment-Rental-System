<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生會設備系統 - 同學登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">📦 學生會設備系統</h1>
        <div class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">學號</label>
                <input type="text" id="sid" placeholder="例如: 409431XX" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">真實姓名</label>
                <input type="text" id="sname" placeholder="請輸入本名" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            <button onclick="login()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition mt-4">
                進入借用系統
            </button>
            <div class="text-center mt-4">
                <a href="admin_login.html" class="text-sm text-gray-400 hover:text-blue-500 underline">我是值班幹部</a>
            </div>
        </div>
    </div>
    <script>
        function login() {
            const sid = document.getElementById("sid").value.trim();
            const sname = document.getElementById("sname").value.trim();
            if (!sid || !sname) return alert("學號與姓名不能為空喔！");
            
            localStorage.setItem("studentId", sid);
            localStorage.setItem("studentName", sname);
            window.location.href = "student.html"; 
        }
    </script>
</body>
</html>

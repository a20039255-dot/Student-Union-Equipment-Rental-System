<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生會設備系統 - 同學登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">📦 設備系統登入</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">學號</label>
                <input type="text" id="sid" placeholder="例如: 409431XX" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">姓名</label>
                <input type="text" id="sname" placeholder="請輸入姓名" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
            </div>

            <button onclick="login()" 
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition mt-4">
                進入借用系統
            </button>
        </div>
    </div>

    <script>
        function login() {
            const sid = document.getElementById("sid").value.trim();
            const sname = document.getElementById("sname").value.trim();

            if (!sid || !sname) {
                alert("學號與姓名不能為空喔！");
                return;
            }

            // 將學號和姓名存入瀏覽器的 LocalStorage
            localStorage.setItem("studentId", sid);
            localStorage.setItem("studentName", sname);

            alert("登入成功！");
            
            // 登入後跳轉回主畫面 (如果你的主畫面叫 index.html 請改為 index.html)
            window.location.href = "student.html"; 
        }
    </script>
</body>
</html>

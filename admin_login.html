<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備部 - 幹部登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center text-slate-800 mb-2">🛡️ 幹部管理系統</h1>
        <p class="text-center text-slate-500 text-sm mb-6">請輸入專屬幹部代號</p>
        <div class="space-y-4">
            <input type="password" id="admin-code" placeholder="輸入代號 (例: ADM-01)" 
                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-500 text-center font-mono text-lg">
            <button onclick="adminLogin()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition">
                身分驗證
            </button>
            <div class="text-center mt-2">
                <a href="login.html" class="text-sm text-gray-400 hover:text-slate-500 underline">返回學生登入</a>
            </div>
        </div>
    </div>
    <script>
        // 🚀 正式切換到企業級 Google Cloud 機房！
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";

        async function adminLogin() {
            const code = document.getElementById("admin-code").value.trim();
            if (!code) return alert("請輸入代號！");
            try {
                const res = await fetch(`${API_URL}/admin/login`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ "幹部代號": code })
                });
                const data = await res.json();
                if (data.成功) {
                    localStorage.setItem("adminName", data.名稱);
                    localStorage.setItem("adminRole", data.職位);
                    alert(`歡迎，${data.職位}：${data.名稱}`);
                    window.location.href = "admin.html";
                } else alert("❌ 代號錯誤");
            } catch (e) { alert("連線異常"); }
        }
    </script>
</body>
</html>

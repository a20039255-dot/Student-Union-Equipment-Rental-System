<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幹部管理後台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .admin-card { border-top: 5px solid #ffc107; }
        @media (max-width: 600px) { .container { padding: 10px; } table { font-size: 0.8rem; } }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">🔐 設備部管理後台</span>
            <button class="btn btn-outline-warning btn-sm" onclick="location.href='index.html'">返回首頁</button>
        </div>
    </nav>

    <div class="container">
        <div id="login-section" class="card p-4 shadow-sm mb-4">
            <h5>幹部登入</h5>
            <div class="input-group mt-3">
                <input type="password" id="admin-id" class="form-control" placeholder="請輸入幹部代號">
                <button class="btn btn-warning" onclick="adminLogin()">登入</button>
            </div>
        </div>

        <div id="admin-main" class="d-none">
            <div class="alert alert-warning d-flex justify-content-between align-items-center">
                <strong id="admin-welcome"></strong>
                <button class="btn btn-sm btn-outline-dark" onclick="adminLogout()">登出</button>
            </div>
            <div class="bg-green-50 p-4 rounded-xl shadow-sm border border-green-200 mb-6">
    <h2 class="font-bold text-green-800 text-lg mb-2 flex items-center">
        <span class="mr-2">🔄</span> 快速一鍵歸還
    </h2>
    <p class="text-sm text-green-600 mb-3">輸入同學學號，可一次歸還該同學名下所有設備。</p>
    <div class="flex gap-2">
        <input type="text" id="return-sid" placeholder="例如: 409431XX" 
        class="border border-gray-300 p-2 rounded-lg flex-1 focus:outline-none focus:border-green-500">
        <button onclick="returnAllByStudent()" 
                class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-bold shadow transition">
            全部歸還
        </button>
    </div>
</div>
            <div class="card admin-card p-3 shadow-sm mb-4">
                <h5 class="mb-3">📋 待歸還清單 (點收區)</h5>
                <div class="table-responsive">
                    <table class="table table-bordered align-middle text-center">
                        <thead class="table-dark">
                            <tr><th>編號</th><th>設備</th><th>借用人</th><th>操作</th></tr>
                        </thead>
                        <tbody id="return-list"></tbody>
                    </table>
                </div>
            </div>

            <div class="card p-3 shadow-sm">
                <h5>👥 幹部名冊 (同步自 Google Sheets)</h5>
                <div class="row mt-3">
                    <div class="col-md-4 mb-3">
                        <input type="text" id="new-id" class="form-control mb-2" placeholder="新代號">
                        <input type="text" id="new-name" class="form-control mb-2" placeholder="新姓名">
                        <button class="btn btn-success w-100" onclick="addAdmin()">新增幹部</button>
                    </div>
                    <div class="col-md-8">
                        <ul id="admin-list" class="list-group"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://student-api-backend-6bfb.onrender.com";
        let currentAdmin = localStorage.getItem("admin_code");

        window.onload = () => { if(currentAdmin) showAdmin(); };

        async function adminLogin() {
            const code = document.getElementById("admin-id").value;
            const res = await fetch(`${API_URL}/admin/login`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({"幹部代號": code})
            });
            if(res.ok) {
                const data = await res.json();
                currentAdmin = code;
                localStorage.setItem("admin_code", code);
                showAdmin();
            } else { alert("代號錯誤！"); }
        }

        function showAdmin() {
            document.getElementById("login-section").classList.add("d-none");
            document.getElementById("admin-main").classList.remove("d-none");
            document.getElementById("admin-welcome").innerText = `負責幹部：${currentAdmin}`;
            fetchAdmins();
            fetchReturns();
        }

        function adminLogout() { localStorage.removeItem("admin_code"); location.reload(); }

        async function fetchAdmins() {
            const res = await fetch(`${API_URL}/admins`);
            const data = await res.json();
            const list = document.getElementById("admin-list");
            list.innerHTML = "";
            for (const [id, name] of Object.entries(data)) {
                list.innerHTML += `<li class="list-group-item d-flex justify-content-between">
                    <b>${name}</b> <small class="text-muted">${id}</small>
                </li>`;
            }
        }

        async function fetchReturns() {
            const res = await fetch(`${API_URL}/transactions`);
            const data = await res.json();
            const list = document.getElementById("return-list");
            list.innerHTML = "";
            const records = Object.values(data);
            if(records.length === 0) { list.innerHTML = "<tr><td colspan='4'>目前無待歸還設備</td></tr>"; return; }
            records.forEach(t => {
                list.innerHTML += `
                    <tr>
                        <td>#${t.交易編號}</td>
                        <td>${t.設備名稱}</td>
                        <td>${t.租借人員學號}</td>
                        <td><button class="btn btn-sm btn-warning" onclick="confirmReturn(${t.交易編號})">確認歸還</button></td>
                    </tr>`;
            });
        }

        async function confirmReturn(tid) {
            if(!confirm("確定已收回設備？")) return;
            const res = await fetch(`${API_URL}/return`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({"交易編號": tid})
            });
            if(res.ok) { alert("點收成功！"); fetchReturns(); }
        }

        async function addAdmin() {
            const id = document.getElementById("new-id").value;
            const name = document.getElementById("new-name").value;
            const res = await fetch(`${API_URL}/admin/add`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({"新幹部代號": id, "新幹部名稱": name})
            });
            if(res.ok) { alert("已同步至 Google Sheets！"); fetchAdmins(); }
        }
        // 一鍵歸還功能
async function returnAllByStudent() {
    const sidInput = document.getElementById("return-sid");
    const sid = sidInput.value.trim();
    
    if(!sid) return alert("請先輸入同學的學號！");
    if(!confirm(`⚠️ 確定要將學號 【${sid}】 借用的「所有設備」一次點收歸還嗎？`)) return;

    try {
        const res = await fetch(`${API_URL}/return_by_student`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ "學號": sid })
        });

        const result = await res.json();
        
        if(result.成功) {
            alert(`✅ 太棒了！成功歸還了 ${result.歸還數量} 項設備！`);
            sidInput.value = ""; // 清空輸入框
            
            // 如果你有寫重新抓取清單的函數 (例如 fetchTransactions)，請在這裡呼叫它來更新畫面
            // fetchTransactions(); 
            
        } else {
            alert(`❌ 歸還失敗：${result.訊息}`);
        }
    } catch (error) {
        alert("網路連線異常，請確認後端伺服器狀態。");
    }
}
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備部幹部後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-md mx-auto space-y-4">
        
        <div class="bg-slate-800 text-white p-6 rounded-2xl shadow-lg flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">🛡️ 管理中心</h1>
                <p id="admin-info" class="mt-1 text-sm text-slate-300">身分驗證中...</p>
            </div>
            <button onclick="logoutAdmin()" class="bg-slate-600 hover:bg-slate-500 px-3 py-2 rounded text-sm transition font-bold">登出</button>
        </div>

        <div id="super-admin-panel" class="bg-purple-100 p-4 rounded-xl shadow-sm border border-purple-200">
            <p class="text-purple-800 font-bold text-sm">👑 最高權限專區：系統設定 (僅管理員可見)</p>
        </div>

        <div class="bg-green-50 p-4 rounded-xl shadow-sm border border-green-200">
            <h2 class="font-bold text-green-800 text-lg mb-2">🔄 依學號批量點收</h2>
            <div class="flex gap-2">
                <input type="text" id="return-sid" placeholder="輸入學號" class="border border-green-300 p-2 rounded-lg flex-1 focus:outline-none">
                <button onclick="returnAllByStudent()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-bold shadow">全部歸還</button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-800 flex items-center">📋 待歸還清單</h2>
                <button onclick="fetchTransactions()" class="text-sm text-blue-500 font-bold">↻ 重新整理</button>
            </div>
            <div id="transaction-list" class="space-y-3">
                <p class="text-center text-gray-500 py-6 animate-pulse font-bold">📡 讀取資料中...</p>
            </div>
        </div>
    </div>

    <script>
        // 🚀 正式切換到企業級 Google Cloud 機房！
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";

        const adminName = localStorage.getItem("adminName");
        const adminRole = localStorage.getItem("adminRole");

        // 權限防護網
        if (!adminName) window.location.href = "admin_login.html";
        else document.getElementById("admin-info").innerText = `值班幹部：${adminName} (${adminRole})`;

        // 角色介面隱藏機制
        if (adminRole === "設備長" || adminRole === "一般幹部") {
            const panel = document.getElementById("super-admin-panel");
            if(panel) panel.style.display = "none";
        }

        function logoutAdmin() {
            localStorage.removeItem("adminName");
            localStorage.removeItem("adminRole");
            window.location.href = "admin_login.html";
        }

        async function fetchTransactions() {
            try {
                const res = await fetch(`${API_URL}/transactions`);
                const data = await res.json();
                const list = document.getElementById("transaction-list");
                list.innerHTML = "";
                
                if(Object.keys(data).length === 0) return list.innerHTML = "<p class='text-center text-gray-400 py-4'>無待歸還設備 🎉</p>";

                for (let tid in data) {
                    const t = data[tid];
                    const overdueClass = t.是否過期 ? "border-red-500 bg-red-50" : "border-gray-200 bg-white";
                    const warningText = t.是否過期 ? `<p class="text-red-600 font-bold text-xs mt-1 animate-pulse">⚠️ 逾期催收</p>` : "";

                    list.innerHTML += `
                        <div class="p-4 rounded-xl border-2 ${overdueClass} shadow-sm">
                            <div class="flex justify-between items-center">
                                <div>
                                    <h3 class="font-bold text-gray-800 text-lg">${t.設備名稱}</h3>
                                    <p class="text-sm text-gray-600 mt-1">借用人：<span class="font-bold">${t.租借人員學號} ${t.租借人員姓名}</span></p>
                                    <p class="text-xs text-gray-500 mt-1">已借用：<span class="font-bold text-blue-600">${t.已借用天數} 天</span></p>
                                    ${warningText}
                                </div>
                                <button onclick="returnItem(${t.交易編號})" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-3 rounded-xl text-sm font-bold shadow-md">
                                    點收歸還
                                </button>
                            </div>
                        </div>`;
                }
            } catch (e) { list.innerHTML = "<p class='text-red-500 text-center'>連線異常</p>"; }
        }

        async function returnItem(tid) {
            if (!confirm(`確定點收此設備？`)) return;
            try {
                const res = await fetch(`${API_URL}/return`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ "交易編號": tid, "點收幹部": adminName })
                });
                if (res.ok) fetchTransactions();
            } catch (e) { alert("歸還失敗"); }
        }

        async function returnAllByStudent() {
            const sid = document.getElementById("return-sid").value.trim();
            if(!sid) return alert("請輸入學號！");
            if(!confirm(`⚠️ 確定點收學號 【${sid}】 的所有設備？`)) return;
            try {
                const res = await fetch(`${API_URL}/return_by_student`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ "學號": sid, "點收幹部": adminName })
                });
                const data = await res.json();
                if(data.成功) {
                    alert(`✅ 成功點收 ${data.歸還數量} 項設備！`);
                    document.getElementById("return-sid").value = ""; 
                    fetchTransactions(); 
                } else alert(`❌ 失敗：${data.訊息}`);
            } catch (e) { alert("連線異常"); }
        }

        fetchTransactions();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備部幹部後台 - V3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-md mx-auto space-y-4">
        
        <div class="bg-slate-800 text-white p-6 rounded-2xl shadow-lg flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">🛡️ 幹部管理中心</h1>
                <p class="mt-1 text-sm text-slate-300">請仔細核對設備狀況</p>
            </div>
            <button onclick="location.href='student.html'" class="bg-slate-600 hover:bg-slate-500 px-3 py-2 rounded text-sm transition font-bold shadow">返回首頁</button>
        </div>

        <div class="bg-green-50 p-4 rounded-xl shadow-sm border border-green-200">
            <h2 class="font-bold text-green-800 text-lg mb-2 flex items-center">
                <span class="mr-2">🔄</span> 快速一鍵歸還
            </h2>
            <p class="text-sm text-green-600 mb-3">輸入同學學號，一次歸還名下所有設備。</p>
            <div class="flex gap-2">
                <input type="text" id="return-sid" placeholder="例如: 409431XX" 
                       class="border border-green-300 p-2 rounded-lg flex-1 focus:outline-none focus:ring-2 focus:ring-green-500">
                <button onclick="returnAllByStudent()" 
                        class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-bold shadow transition">
                    全部歸還
                </button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-md">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-800 flex items-center">
                    <span class="mr-2">📋</span> 待歸還清單
                </h2>
                <button onclick="fetchTransactions()" class="text-sm text-blue-500 hover:text-blue-700 font-bold">↻ 重新整理</button>
            </div>
            <div id="transaction-list" class="space-y-3">
                </div>
        </div>
    </div>

    <script>
        // ⚠️ 部長請注意：填入你的 Render 網址
        const API_URL = "https://student-api-backend-6bfb.onrender.com"; 

        async function fetchTransactions() {
            try {
                const res = await fetch(`${API_URL}/transactions`);
                const data = await res.json();
                const list = document.getElementById("transaction-list");
                list.innerHTML = "";
                
                if(Object.keys(data).length === 0) {
                    list.innerHTML = "<p class='text-center text-gray-400 py-4'>目前沒有借出任何設備 🎉</p>";
                    return;
                }

                for (let tid in data) {
                    const t = data[tid];
                    // V3.0 過期警告邏輯
                    const overdueClass = t.是否過期 ? "border-red-500 bg-red-50" : "border-gray-200 bg-white";
                    const warningText = t.是否過期 ? `<p class="text-red-600 font-bold text-xs mt-1 animate-pulse">⚠️ 已逾期！請聯絡催收</p>` : "";

                    list.innerHTML += `
                        <div class="p-4 rounded-xl border-2 ${overdueClass} shadow-sm transition-all">
                            <div class="flex justify-between items-center">
                                <div>
                                    <h3 class="font-bold text-gray-800 text-lg">${t.設備名稱}</h3>
                                    <p class="text-sm text-gray-600 mt-1">借用人：<span class="font-bold">${t.租借人員學號}</span></p>
                                    <p class="text-xs text-gray-500 mt-1">已借用：<span class="font-bold text-blue-600">${t.已借用天數} 天</span></p>
                                    ${warningText}
                                </div>
                                <button onclick="returnItem(${t.交易編號})" 
                                        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-3 rounded-xl text-sm font-bold shadow-md transition">
                                    點收歸還
                                </button>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById("transaction-list").innerHTML = "<p class='text-red-500 text-center'>無法連線至伺服器</p>";
            }
        }

        async function returnItem(tid) {
            if (!confirm(`確定要歸還這項設備嗎？`)) return;
            try {
                const res = await fetch(`${API_URL}/return`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ "交易編號": tid })
                });
                if (res.ok) fetchTransactions();
            } catch (e) {
                alert("歸還失敗");
            }
        }

        async function returnAllByStudent() {
            const sidInput = document.getElementById("return-sid");
            const sid = sidInput.value.trim();
            
            if(!sid) return alert("請先輸入同學的學號！");
            if(!confirm(`⚠️ 確定要將學號 【${sid}】 借用的「所有設備」一次點收歸還嗎？`)) return;

            try {
                const res = await fetch(`${API_URL}/return_by_student`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ "學號": sid })
                });
                const result = await res.json();
                
                if(result.成功) {
                    alert(`✅ 太棒了！成功歸還了 ${result.歸還數量} 項設備！`);
                    sidInput.value = ""; 
                    fetchTransactions(); 
                } else {
                    alert(`❌ 歸還失敗：${result.訊息}`);
                }
            } catch (error) {
                alert("網路連線異常，請確認後端伺服器狀態。");
            }
        }

        fetchTransactions();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生會設備借用 - V4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 讓捲動軸好看一點 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 pb-20">
    <div class="max-w-md mx-auto space-y-4">
        
        <div class="bg-blue-600 text-white p-6 rounded-2xl shadow-lg flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">📦 設備借用</h1>
                <p id="student-info" class="mt-1 text-sm opacity-90">身分驗證中...</p>
            </div>
            <button onclick="logout()" class="bg-blue-800 hover:bg-blue-900 px-3 py-2 rounded-lg text-sm transition font-bold shadow">登出</button>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-md border border-gray-100">
            <h2 class="text-lg font-bold mb-4 flex items-center text-gray-800">
                <span class="mr-2">🔍</span> 可借用設備
            </h2>
            <div id="equipment-list" class="space-y-3">
                <p class="text-center text-gray-500 py-6 animate-pulse">📡 正在同步雲端庫存...</p>
            </div>
        </div>

        <div id="cart-section" class="bg-white p-5 rounded-t-3xl shadow-[0_-10px_25px_-5px_rgba(0,0,0,0.1)] border-t-2 border-yellow-400 hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto z-50">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-yellow-700 flex items-center">
                    <span class="mr-2">🛒</span> 待借用清單
                </h2>
                <span id="cart-total-count" class="bg-yellow-200 text-yellow-800 text-xs font-bold px-2 py-1 rounded-full">0 項</span>
            </div>
            
            <ul id="cart-list" class="space-y-2 mb-4 text-sm text-gray-700 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                </ul>
            
            <button onclick="submitBatchBorrow()" 
                    class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-4 rounded-2xl transition shadow-lg active:scale-95">
                確認借出這些設備
            </button>
        </div>
    </div>

    <script>
        // 🚀 正式切換到企業級 Google Cloud 機房！
        const API_URL = "https://student-api-174932950003.asia-east1.run.app";
        
        const sid = localStorage.getItem("studentId");
        const sname = localStorage.getItem("studentName");
        let cart = []; // 存原始資料 [{id, name}, ...]

        if (!sid) window.location.href = "login.html";
        else document.getElementById("student-info").innerText = `同學你好：${sname} (${sid})`;

        function logout() { localStorage.clear(); window.location.href = "login.html"; }

        // 1. 抓取設備並生成下拉選單
        async function fetchEquipments() {
            try {
                const res = await fetch(`${API_URL}/equipments`);
                const data = await res.json();
                const list = document.getElementById("equipment-list");
                list.innerHTML = "";
                
                for (let id in data) {
                    const item = data[id];
                    // 計算該品項最多還能選幾個 (庫存與上限取最小值)
                    const maxSelectable = Math.min(item.剩餘數量, item.借用上限);
                    let options = "";
                    for(let i=1; i<=maxSelectable; i++) options += `<option value="${i}">${i}</option>`;

                    list.innerHTML += `
                        <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-200 shadow-sm">
                            <div class="flex-1">
                                <p class="font-bold text-gray-800 text-lg">${item.設備名稱}</p>
                                <p class="text-sm text-gray-600">庫存: <span class="font-bold text-blue-600">${item.剩餘數量}</span> | 限借: ${item.借用上限}</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <select id="qty-${id}" class="border border-gray-300 rounded-xl px-2 py-2 bg-white font-bold focus:ring-2 focus:ring-blue-400" ${maxSelectable <= 0 ? 'disabled' : ''}>
                                    ${options || '<option>0</option>'}
                                </select>
                                <button onclick="addToCart('${id}', '${item.設備名稱}', ${item.剩餘數量}, ${item.借用上限})" 
                                        class="${maxSelectable <= 0 ? 'bg-gray-300 text-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 text-white shadow-md'} px-4 py-2 rounded-xl font-bold text-sm transition"
                                        ${maxSelectable <= 0 ? 'disabled' : ''}>+ 加入</button>
                            </div>
                        </div>`;
                }
            } catch (e) { alert("連線失敗"); }
        }

        // 2. 加入購物車 (支援數量)
        function addToCart(id, name, availableQty, maxLimit) {
            const addCount = parseInt(document.getElementById(`qty-${id}`).value);
            const inCartCount = cart.filter(i => i.id === id).length;

            if (inCartCount + addCount > maxLimit) return alert(`❌ 超過每人限借數量 (${maxLimit})！`);
            if (inCartCount + addCount > availableQty) return alert(`⚠️ 庫存不足！`);

            for(let i=0; i<addCount; i++) cart.push({ id, name });
            renderCart();
        }

        // 3. 聚合顯示 (核心邏輯：將 Array 轉成物件統計)
// 1. 聚合顯示 (加入「移除數量」選單)
        function renderCart() {
            const section = document.getElementById("cart-section");
            const list = document.getElementById("cart-list");
            document.getElementById("cart-total-count").innerText = `${cart.length} 項`;
            
            if (cart.length > 0) {
                section.classList.remove("hidden");
                // 統計各品項數量
                const grouped = cart.reduce((acc, curr) => {
                    acc[curr.id] = acc[curr.id] || { name: curr.name, count: 0 };
                    acc[curr.id].count++;
                    return acc;
                }, {});

                list.innerHTML = Object.keys(grouped).map(id => {
                    const item = grouped[id];
                    // 💡 動態生成「移除數量」的選單 (1 ~ 目前已選數量)
                    let removeOptions = "";
                    for(let i=1; i<=item.count; i++) {
                        removeOptions += `<option value="${i}">${i}</option>`;
                    }

                    return `
                    <li class="flex flex-col gap-2 bg-gray-50 p-3 rounded-xl border border-gray-100 mb-2">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-gray-800">${item.name}</span>
                                <span class="text-blue-600 font-black">x ${item.count}</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-end gap-2">
                            <span class="text-xs text-gray-400">移除數量:</span>
                            <select id="remove-qty-${id}" class="text-xs border border-gray-200 rounded-md px-1 py-1 bg-white">
                                ${removeOptions}
                            </select>
                            <button onclick="removeFromCart('${id}')" class="text-red-500 hover:bg-red-50 px-2 py-1 rounded-lg text-xs font-bold transition">執行移除</button>
                        </div>
                    </li>`;
                }).join('');
            } else {
                section.classList.add("hidden");
            }
        }

        // 2. 精準移除邏輯 (核心升級)
        function removeFromCart(id) {
            const removeQty = parseInt(document.getElementById(`remove-qty-${id}`).value);
            
            // 💡 使用迴圈配合 findIndex，一個一個把對應 ID 的物件從陣列中切除
            for(let i=0; i < removeQty; i++) {
                const targetIndex = cart.findIndex(item => item.id === id);
                if (targetIndex !== -1) {
                    cart.splice(targetIndex, 1); // 刪除找到的那個索引位置
                }
            }
            
            renderCart(); // 重新渲染畫面
        }

        async function submitBatchBorrow() {
            if (cart.length === 0) return;
            if (!confirm(`確定借出這 ${cart.length} 件設備嗎？`)) return;

            try {
                const res = await fetch(`${API_URL}/borrow_batch`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ "租借人員學號": sid, "租借人員姓名": sname, "設備清單": cart })
                });
                if (res.ok) {
                    alert("✅ 借用完成！");
                    cart = []; renderCart(); fetchEquipments();
                }
            } catch (e) { alert("連線異常"); }
        }

        fetchEquipments();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生借用區</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .device-card { border-radius: 15px; transition: 0.3s; border: 1px solid #eee; }
        @media (max-width: 600px) { table { font-size: 0.9rem; } .btn-sm-custom { padding: 5px 10px; } }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand">🎓 學生借用區</span>
            <button class="btn btn-outline-light btn-sm" onclick="location.href='index.html'">返回首頁</button>
        </div>
    </nav>

    <div class="container">
        <div id="login-section" class="card p-4 mb-4 shadow-sm">
            <h5>👋 同學你好，請輸入學號開始使用</h5>
            <div class="input-group mt-3">
                <input type="text" id="student-id" class="form-control" placeholder="請輸入學號 (例: B11001001)">
                <button class="btn btn-primary" onclick="login()">進入系統</button>
            </div>
        </div>

        <div id="main-section" class="d-none">
            <div class="alert alert-info d-flex justify-content-between">
                <span id="welcome-text"></span>
                <button class="btn btn-sm btn-danger" onclick="logout()">登出</button>
            </div>
            <div class="card p-3 shadow-sm">
                <h4 class="mb-3">📦 可借用設備清單</h4>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr><th>設備名稱</th><th>剩餘數量</th><th>操作</th></tr>
                        </thead>
                        <tbody id="device-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://student-api-backend-6bfb.onrender.com";
        let currentStudentId = localStorage.getItem("student_id");

        window.onload = () => { if(currentStudentId) showMain(); };

        function login() {
            const id = document.getElementById("student-id").value.trim();
            if(!id) return alert("請輸入學號");
            currentStudentId = id;
            localStorage.setItem("student_id", id);
            showMain();
        }

        function showMain() {
            document.getElementById("login-section").classList.add("d-none");
            document.getElementById("main-section").classList.remove("d-none");
            document.getElementById("welcome-text").innerText = `同學你好：${currentStudentId}`;
            fetchDevices();
        }

        function logout() {
            localStorage.removeItem("student_id");
            location.reload();
        }

        async function fetchDevices() {
            const res = await fetch(`${API_URL}/equipments`);
            const data = await res.json();
            const list = document.getElementById("device-list");
            list.innerHTML = "";
            for (const [id, info] of Object.entries(data)) {
                list.innerHTML += `
                    <tr>
                        <td><strong>${info.設備名稱}</strong></td>
                        <td><span class="badge bg-success">${info.剩餘數量}</span> / ${info.總數量}</td>
                        <td><button class="btn btn-sm btn-primary" onclick="borrowDevice('${id}')">借用</button></td>
                    </tr>`;
            }
        }

        async function borrowDevice(id) {
            try {
                const res = await fetch(`${API_URL}/borrow`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({"設備編號": id, "租借人員學號": currentStudentId})
                });
                if(res.ok) { alert("借用成功！請至櫃台領取。"); fetchDevices(); }
                else { alert("借用失敗，可能庫存不足。"); }
            } catch(e) { alert("連線錯誤！"); }
        }
    </script>
</body>
</html>
